<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCQ Exam System</title>

<style>
body { margin:0; font-family:'Segoe UI'; background:#eef2f7; }

header {
    background:#1e293b; color:white;
    padding:15px 30px;
    display:flex; justify-content:space-between;
}

.progress { width:200px; height:10px; background:#334155; border-radius:10px; }
.progress-bar { height:100%; width:0%; background:#22c55e; border-radius:10px; }

.container { width:85%; margin:auto; margin-top:20px; }

.card {
    background:white; padding:18px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.option {
    display:block;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    background:#f1f5f9;
    cursor:pointer;
}

.option:hover { background:#e2e8f0; }

.submit-btn {
    display:block;
    margin:30px auto;
    padding:12px 30px;
    font-size:16px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
}

#result {
    width:85%;
    margin:auto;
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:10px;
}

.wrong { color:red; }
.correct { color:green; }

footer {
    text-align:center;
    padding:15px;
    background:#1e293b;
    color:white;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
<h2>📘 MCQ Exam ANDROID PROGRAMMING</h2>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
</header>

<div class="container" id="quiz"></div>

<button class="submit-btn" onclick="submitTest()">Submit Test</button>

<div id="result"></div>

<footer>© HACKERS LOBBY SK | PHOD KE AAYENGE</footer>

<script>

// Shuffle options
function shuffleOptions(question){
    let arr = question.options.map((opt,i)=>({
        text: opt,
        correct: i===question.answer
    }));
    arr.sort(()=>Math.random()-0.5);
    return arr;
}

{q:`You updated a layout XML file, but changes are not reflecting in the app. What should you do first?`,options:["Restart device","Clean & Rebuild project","Delete code","Change Activity"],answer:1},

{q:`Which tool is used for version control?`,options:["Git","Java","XML","SQLite"],answer:0},
{q:`What is SQLite?`,options:["Programming language","Lightweight database","UI tool","API"],answer:1},

];

// Render
const quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{
    let shuffled=shuffleOptions(q);
    q.shuffledOptions=shuffled;

    let html=`<div class="card"><h3>Q${i+1}. ${q.q}</h3>`;
    shuffled.forEach((opt,j)=>{
        html+=`<label class="option">
        <input type="radio" name="q${i}" value="${j}" onchange="updateProgress()">
        ${opt.text}</label>`;
    });
    html+=`</div>`;
    quiz.innerHTML+=html;
});

function updateProgress(){
    let done=document.querySelectorAll("input:checked").length;
    document.getElementById("progressBar").style.width=(done/questions.length*100)+"%";
}

function submitTest(){
    let score=0,wrong="";
    questions.forEach((q,i)=>{
        let sel=document.querySelector(`input[name="q${i}"]:checked`);
        let ans=sel?parseInt(sel.value):-1;

        if(ans!==-1 && q.shuffledOptions[ans].correct) score++;
        else{
            let correct=q.shuffledOptions.find(o=>o.correct);
            wrong+=`<p class="wrong"><b>Q${i+1}:</b> ${q.q}</p>
            <p>Your Answer: ${ans==-1?"Not Attempted":q.shuffledOptions[ans].text}</p>
            <p class="correct">Correct Answer: ${correct.text}</p><hr>`;
        }
    });

    document.getElementById("result").innerHTML=
    `<h2>🎯 Score: ${score}/${questions.length}</h2>
     <h3>❌ Wrong Answers</h3>${wrong}`;
}
</script>
</body>
</html>
